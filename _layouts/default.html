<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#14110f">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/images/logos/favico.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/images/logos/favico.png' | relative_url }}">

  {% assign seo_title = page.seo_title | default: page.title %}
  <title>{{ seo_title }}{% unless page.url == '/' %} | Marcelo Lopez Lopez{% endunless %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">

  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ seo_title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="Marcelo Lopez Photography">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,360;9..144,440;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind (utility layer) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Brand stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {% if page.schema %}{% include schema/{{ page.schema }} %}{% endif %}
</head>
<body>
  {% include header.html %}
  <main id="main">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
