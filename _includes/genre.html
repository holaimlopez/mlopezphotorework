<section class="hero" style="min-height:60vh;">
  <div class="hero-media"><div class="frame" aria-hidden="true" style="height:100%;"></div></div>
  <div class="hero-inner wrap" role="img" aria-label="{{ page.hero_alt }}">
    <p class="eyebrow">{{ page.eyebrow }}</p>
    <h1 class="mt-3" style="font-size:clamp(2.4rem,7vw,5rem);">{{ page.heading }}</h1>
  </div>
</section>

<section class="section">
  <div class="wrap wrap-tight">
    <p class="lede reveal prose">{{ page.copy }}</p>
    <div class="mt-8 reveal flex flex-wrap gap-4">
      <a href="{{ '/contact/' | relative_url }}" class="btn btn-primary">Enquire about a session <span class="arrow">&rarr;</span></a>
      <a href="{{ '/portfolio/' | relative_url }}" class="btn btn-ghost">Back to portfolio</a>
    </div>
  </div>
</section>

<section class="section" style="padding-top:0;">
  <div class="wrap">
    <div class="grid grid-cols-2 md:grid-cols-3 gap-5">
      {% for i in (1..3) %}
        <div class="card-media reveal" style="aspect-ratio:4/5;border-radius:4px;">
          <div class="frame" role="img" aria-label="{{ page.hero_alt }}-frame-{{ i }}"><span class="mono">Frame {{ i }}</span></div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
